name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build
        run: swift build --product VibeCopy

  release:
    name: Release DMG
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build DMG
        run: scripts/create-dmg.sh

      - name: Rename DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv dist/VibeCopy.dmg "dist/VibeCopy-${VERSION}.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VibeCopy-*.dmg
          generate_release_notes: true
